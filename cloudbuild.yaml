steps:
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['ci']
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['test']
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'devpilot',
           '--source', '.',
           '--region', 'us-central1',
           '--allow-unauthenticated']
images:
  - 'gcr.io/$PROJECT_ID/devpilot'
